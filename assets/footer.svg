<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="900" height="80" viewBox="0 0 900 80"
     role="img" aria-labelledby="footer-title">

  <title id="footer-title">SMCU — Footer</title>

  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>

  <defs>
    <linearGradient id="ftBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#03000F"/>
      <stop offset="50%"  stop-color="#07001C"/>
      <stop offset="100%" stop-color="#03000F"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#03000F"/>
      <stop offset="20%"  stop-color="#7C3AED"/>
      <stop offset="50%"  stop-color="#06B6D4"/>
      <stop offset="80%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#03000F"/>
    </linearGradient>
    <filter id="fGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="80" fill="url(#ftBg)"/>

  <!-- Top separator line (animated) -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="url(#lineGrad)" stroke-width="1" filter="url(#fGlow)">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Left: network mini-icon -->
  <circle cx="35" cy="40" r="5" fill="#7C3AED" filter="url(#fGlow)">
    <animate attributeName="r" values="5;6.5;5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <line x1="35" y1="40" x2="58" y2="28" stroke="#7C3AED" stroke-width="0.8" opacity="0.6"/>
  <line x1="35" y1="40" x2="58" y2="52" stroke="#7C3AED" stroke-width="0.8" opacity="0.6"/>
  <circle cx="58" cy="28" r="3" fill="#06B6D4" opacity="0.75"/>
  <circle cx="58" cy="52" r="3" fill="#10B981" opacity="0.75"/>

  <!-- Center: SMCU text -->
  <text x="450" y="32"
        font-family="'Courier New',monospace" font-size="11" font-weight="bold"
        fill="#7C3AED" text-anchor="middle" letter-spacing="4" filter="url(#fGlow)">
    SMCU — THE MYCELIUM PROTOCOL
  </text>

  <!-- Center: tagline -->
  <text x="450" y="50"
        font-family="'Courier New',monospace" font-size="8.5"
        fill="#06B6D4" text-anchor="middle" opacity="0.75" letter-spacing="1.5">
    Open Standard · MIT License · github.com/Tryboy869/smcu-protocol
  </text>

  <!-- Center: made by -->
  <text x="450" y="68"
        font-family="'Courier New',monospace" font-size="7.5"
        fill="#3B0764" text-anchor="middle" opacity="0.8" letter-spacing="1">
    Designed by Daouda Abdoul Anzize · Cotonou, Bénin 🌍
  </text>

  <!-- Right: pulse dots -->
  <circle cx="842" cy="40" r="3" fill="#10B981">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="854" cy="40" r="3" fill="#06B6D4">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle cx="866" cy="40" r="3" fill="#7C3AED">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.8s"/>
  </circle>

</svg>
