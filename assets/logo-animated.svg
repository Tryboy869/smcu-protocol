<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="900" height="220" viewBox="0 0 900 220"
     role="img" aria-labelledby="smcu-title">

  <title id="smcu-title">SMCU — The Mycelium Protocol</title>

  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>

  <defs>
    <!-- Backgrounds -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#03000F"/>
      <stop offset="55%"  stop-color="#07011A"/>
      <stop offset="100%" stop-color="#030010"/>
    </linearGradient>

    <!-- Filament gradient (purple → cyan) -->
    <linearGradient id="filGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="filGradRev" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="gNodeHigh" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gNodeLow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gText" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gTextSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gPulse" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════════ -->
  <!--  BACKGROUND                               -->
  <!-- ══════════════════════════════════════════ -->
  <rect width="900" height="220" fill="url(#bgGrad)"/>

  <!-- Subtle dot grid (left half) -->
  <g opacity="0.06" fill="#7C3AED">
    <circle cx="50"  cy="40"  r="1"/><circle cx="100" cy="40"  r="1"/>
    <circle cx="150" cy="40"  r="1"/><circle cx="200" cy="40"  r="1"/>
    <circle cx="250" cy="40"  r="1"/><circle cx="300" cy="40"  r="1"/>
    <circle cx="350" cy="40"  r="1"/><circle cx="400" cy="40"  r="1"/>
    <circle cx="50"  cy="80"  r="1"/><circle cx="100" cy="80"  r="1"/>
    <circle cx="150" cy="80"  r="1"/><circle cx="200" cy="80"  r="1"/>
    <circle cx="250" cy="80"  r="1"/><circle cx="300" cy="80"  r="1"/>
    <circle cx="350" cy="80"  r="1"/><circle cx="400" cy="80"  r="1"/>
    <circle cx="50"  cy="120" r="1"/><circle cx="100" cy="120" r="1"/>
    <circle cx="150" cy="120" r="1"/><circle cx="250" cy="120" r="1"/>
    <circle cx="300" cy="120" r="1"/><circle cx="350" cy="120" r="1"/>
    <circle cx="400" cy="120" r="1"/><circle cx="50"  cy="160" r="1"/>
    <circle cx="100" cy="160" r="1"/><circle cx="150" cy="160" r="1"/>
    <circle cx="200" cy="160" r="1"/><circle cx="250" cy="160" r="1"/>
    <circle cx="300" cy="160" r="1"/><circle cx="350" cy="160" r="1"/>
    <circle cx="400" cy="160" r="1"/><circle cx="50"  cy="200" r="1"/>
    <circle cx="100" cy="200" r="1"/><circle cx="150" cy="200" r="1"/>
    <circle cx="200" cy="200" r="1"/><circle cx="250" cy="200" r="1"/>
    <circle cx="300" cy="200" r="1"/><circle cx="350" cy="200" r="1"/>
    <circle cx="400" cy="200" r="1"/>
  </g>

  <!-- ══════════════════════════════════════════ -->
  <!--  MYCELIUM NETWORK (center: 200, 110)      -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Level 1 filaments (6 main branches) -->
  <line x1="200" y1="110" x2="285" y2="48"  stroke="url(#filGrad)"    stroke-width="1.4"/>
  <line x1="200" y1="110" x2="305" y2="110" stroke="url(#filGrad)"    stroke-width="1.4"/>
  <line x1="200" y1="110" x2="285" y2="172" stroke="url(#filGrad)"    stroke-width="1.4"/>
  <line x1="200" y1="110" x2="115" y2="172" stroke="url(#filGradRev)" stroke-width="1.4"/>
  <line x1="200" y1="110" x2="95"  y2="110" stroke="url(#filGradRev)" stroke-width="1.4"/>
  <line x1="200" y1="110" x2="115" y2="48"  stroke="url(#filGradRev)" stroke-width="1.4"/>

  <!-- Level 2 filaments (sub-branches) -->
  <line x1="285" y1="48"  x2="345" y2="22"  stroke="#06B6D4" stroke-width="0.7" opacity="0.45"/>
  <line x1="285" y1="48"  x2="355" y2="62"  stroke="#06B6D4" stroke-width="0.7" opacity="0.45"/>
  <line x1="305" y1="110" x2="375" y2="88"  stroke="#10B981" stroke-width="0.7" opacity="0.45"/>
  <line x1="305" y1="110" x2="375" y2="132" stroke="#10B981" stroke-width="0.7" opacity="0.45"/>
  <line x1="285" y1="172" x2="345" y2="198" stroke="#06B6D4" stroke-width="0.7" opacity="0.45"/>
  <line x1="285" y1="172" x2="355" y2="158" stroke="#06B6D4" stroke-width="0.7" opacity="0.45"/>
  <line x1="115" y1="172" x2="55"  y2="198" stroke="#10B981" stroke-width="0.7" opacity="0.45"/>
  <line x1="115" y1="172" x2="45"  y2="158" stroke="#10B981" stroke-width="0.7" opacity="0.45"/>
  <line x1="95"  y1="110" x2="25"  y2="88"  stroke="#06B6D4" stroke-width="0.7" opacity="0.45"/>
  <line x1="95"  y1="110" x2="25"  y2="132" stroke="#06B6D4" stroke-width="0.7" opacity="0.45"/>
  <line x1="115" y1="48"  x2="55"  y2="22"  stroke="#10B981" stroke-width="0.7" opacity="0.45"/>
  <line x1="115" y1="48"  x2="45"  y2="62"  stroke="#10B981" stroke-width="0.7" opacity="0.45"/>

  <!-- ── Pulse rings from center (mycelium signal) ── -->
  <circle cx="200" cy="110" r="8" fill="none" stroke="#7C3AED" stroke-width="1.2" filter="url(#gPulse)">
    <animate attributeName="r"       values="8;90"   dur="4s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" values="0.9;0"  dur="4s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="200" cy="110" r="8" fill="none" stroke="#5B21B6" stroke-width="1">
    <animate attributeName="r"       values="8;90"   dur="4s" repeatCount="indefinite" begin="1.33s"/>
    <animate attributeName="opacity" values="0.7;0"  dur="4s" repeatCount="indefinite" begin="1.33s"/>
  </circle>
  <circle cx="200" cy="110" r="8" fill="none" stroke="#06B6D4" stroke-width="0.8">
    <animate attributeName="r"       values="8;90"   dur="4s" repeatCount="indefinite" begin="2.66s"/>
    <animate attributeName="opacity" values="0.5;0"  dur="4s" repeatCount="indefinite" begin="2.66s"/>
  </circle>

  <!-- ── Level 1 nodes ── -->
  <circle cx="285" cy="48"  r="6.5" fill="#7C3AED" filter="url(#gNodeHigh)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="3.2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="305" cy="110" r="6.5" fill="#7C3AED" filter="url(#gNodeHigh)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="3.2s" repeatCount="indefinite" begin="0.53s"/>
  </circle>
  <circle cx="285" cy="172" r="6.5" fill="#7C3AED" filter="url(#gNodeHigh)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="3.2s" repeatCount="indefinite" begin="1.06s"/>
  </circle>
  <circle cx="115" cy="172" r="6.5" fill="#7C3AED" filter="url(#gNodeHigh)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="3.2s" repeatCount="indefinite" begin="1.6s"/>
  </circle>
  <circle cx="95"  cy="110" r="6.5" fill="#7C3AED" filter="url(#gNodeHigh)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="3.2s" repeatCount="indefinite" begin="2.13s"/>
  </circle>
  <circle cx="115" cy="48"  r="6.5" fill="#7C3AED" filter="url(#gNodeHigh)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="3.2s" repeatCount="indefinite" begin="2.66s"/>
  </circle>

  <!-- ── Level 2 nodes ── -->
  <circle cx="345" cy="22"  r="3.5" fill="#06B6D4" opacity="0.75" filter="url(#gNodeLow)"/>
  <circle cx="355" cy="62"  r="3.5" fill="#06B6D4" opacity="0.75" filter="url(#gNodeLow)"/>
  <circle cx="375" cy="88"  r="3.5" fill="#10B981" opacity="0.75" filter="url(#gNodeLow)"/>
  <circle cx="375" cy="132" r="3.5" fill="#10B981" opacity="0.75" filter="url(#gNodeLow)"/>
  <circle cx="345" cy="198" r="3.5" fill="#06B6D4" opacity="0.75" filter="url(#gNodeLow)"/>
  <circle cx="355" cy="158" r="3.5" fill="#06B6D4" opacity="0.75" filter="url(#gNodeLow)"/>
  <circle cx="55"  cy="198" r="3.5" fill="#10B981" opacity="0.75" filter="url(#gNodeLow)"/>
  <circle cx="45"  cy="158" r="3.5" fill="#10B981" opacity="0.75" filter="url(#gNodeLow)"/>
  <circle cx="25"  cy="88"  r="3.5" fill="#06B6D4" opacity="0.75" filter="url(#gNodeLow)"/>
  <circle cx="25"  cy="132" r="3.5" fill="#06B6D4" opacity="0.75" filter="url(#gNodeLow)"/>
  <circle cx="55"  cy="22"  r="3.5" fill="#10B981" opacity="0.75" filter="url(#gNodeLow)"/>
  <circle cx="45"  cy="62"  r="3.5" fill="#10B981" opacity="0.75" filter="url(#gNodeLow)"/>

  <!-- ── Central node — THE REGISTRY ── -->
  <circle cx="200" cy="110" r="16" fill="#0D001F" stroke="#7C3AED" stroke-width="1.8" filter="url(#gNodeHigh)">
    <animate attributeName="stroke-width" values="1.8;2.8;1.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="110" r="8" fill="#7C3AED" filter="url(#gNodeHigh)">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#7C3AED;#8B5CF6;#7C3AED" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- ══════════════════════════════════════════ -->
  <!--  SEPARATOR                                -->
  <!-- ══════════════════════════════════════════ -->
  <line x1="435" y1="28" x2="435" y2="192" stroke="#7C3AED" stroke-width="0.5" opacity="0.4"/>

  <!-- ══════════════════════════════════════════ -->
  <!--  TEXT SECTION                             -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Activity dots (top left of text) -->
  <circle cx="455" cy="48" r="2.5" fill="#06B6D4">
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="465" cy="48" r="2.5" fill="#06B6D4">
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="0.36s"/>
  </circle>
  <circle cx="475" cy="48" r="2.5" fill="#06B6D4">
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="0.72s"/>
  </circle>
  <text x="488" y="53" font-family="'Courier New',monospace" font-size="8"
        fill="#5B21B6" letter-spacing="2">LIVE REGISTRY</text>

  <!-- Main title -->
  <text x="452" y="105"
        font-family="'Courier New',monospace" font-size="52" font-weight="bold"
        fill="#7C3AED" filter="url(#gText)" letter-spacing="6">
    SMCU
  </text>

  <!-- Subtitle -->
  <text x="452" y="130"
        font-family="'Courier New',monospace" font-size="12.5"
        fill="#06B6D4" opacity="0.92" letter-spacing="2.2">
    Système de Mémoire Collective Universelle
  </text>

  <!-- Tagline -->
  <text x="452" y="158"
        font-family="'Courier New',monospace" font-size="10"
        fill="#10B981" opacity="0.85" letter-spacing="1.5">
    ◆  The Mycelium Protocol  ◆
  </text>

  <!-- Badges row -->
  <!-- v1.0.0 -->
  <rect x="452" y="170" width="68" height="19" rx="3" fill="#0D001F" stroke="#7C3AED" stroke-width="0.6"/>
  <text x="486" y="183" font-family="'Courier New',monospace" font-size="9"
        fill="#8B5CF6" text-anchor="middle">v 1.0.0</text>

  <!-- MIT -->
  <rect x="526" y="170" width="42" height="19" rx="3" fill="#0D001F" stroke="#10B981" stroke-width="0.6"/>
  <text x="547" y="183" font-family="'Courier New',monospace" font-size="9"
        fill="#10B981" text-anchor="middle">MIT</text>

  <!-- Allpath -->
  <rect x="574" y="170" width="72" height="19" rx="3" fill="#0D001F" stroke="#06B6D4" stroke-width="0.6"/>
  <text x="610" y="183" font-family="'Courier New',monospace" font-size="9"
        fill="#06B6D4" text-anchor="middle">Allpath ✓</text>

  <!-- Bottom micro-text -->
  <text x="452" y="205"
        font-family="'Courier New',monospace" font-size="8"
        fill="#3B0764" opacity="0.7" letter-spacing="1">
    Une erreur documentée une fois, évitée par tous.
  </text>

</svg>
